image: python:3.11-slim

stages:
  - install
  - lint
  - test

install_backend:
  stage: install
  script:
    - pip install -r app/requirements.txt

lint_backend:
  stage: lint
  script:
    - pip install flake8
    - flake8 app/ --max-line-length=120 --ignore=W293
  allow_failure: true

lint_frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
  allow_failure: true

test_backend:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest app/ --cov=app/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    when: always
  allow_failure: true
