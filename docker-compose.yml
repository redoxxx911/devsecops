services:
  backend:
    build:
      context: ./app
      dockerfile: ../docker/backend.Dockerfile
    image: zero-trust-vault/backend:semester
    container_name: vault-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    image: zero-trust-vault/frontend:semester
    container_name: vault-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - elasticsearch
      - kibana
    restart: unless-stopped

  secops-bot:
    build:
      context: ./secops-bot
      dockerfile: ../docker/secops-bot.Dockerfile
    image: zero-trust-vault/secops-bot:semester
    container_name: secops-bot
    env_file:
      - ./secops-bot/.env.example
    depends_on:
      - backend
      - elasticsearch
    restart: unless-stopped
