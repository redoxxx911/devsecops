image: python:3.11-slim

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
  BOT_IMAGE: "$CI_REGISTRY_IMAGE/secops-bot:$CI_COMMIT_SHA"
  ZAP_TARGET_URL: "http://frontend"

stages:
  - install
  - lint
  - test
  - sast
  - build
  - container_scan
  - push
  - dast
  - deploy

install_backend_dependencies:
  stage: install
  script:
    - pip install -r app/requirements.txt
  artifacts:
    paths:
      - .cache/pip
    expire_in: 1 week

lint_backend:
  stage: lint
  script:
    - pip install flake8
    - flake8 app/ --max-line-length=120 --ignore=W293
  allow_failure: true

lint_frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
  allow_failure: true

test_backend:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest app/ --cov=app/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    when: always
  allow_failure: true

sonarqube_sast:
  stage: sast
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  script:
    - sonar-scanner -Dsonar.projectKey=zero-trust-vault -Dsonar.sources=app,frontend/src,secops-bot
  allow_failure: true

build_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -f docker/backend.Dockerfile -t "$BACKEND_IMAGE" ./app
    - docker build -f docker/frontend.Dockerfile -t "$FRONTEND_IMAGE" ./frontend
    - docker build -f docker/secops-bot.Dockerfile -t "$BOT_IMAGE" ./secops-bot
    - docker save "$BACKEND_IMAGE" > backend-image.tar
    - docker save "$FRONTEND_IMAGE" > frontend-image.tar
    - docker save "$BOT_IMAGE" > secops-bot-image.tar
  artifacts:
    paths:
      - backend-image.tar
      - frontend-image.tar
      - secops-bot-image.tar
    expire_in: 1 week

trivy_container_scan:
  stage: container_scan
  image:
    name: ghcr.io/aquasecurity/trivy:0.69.3
    entrypoint: [""]
  script:
    - trivy image --no-progress --severity HIGH,CRITICAL --input backend-image.tar --format table --output trivy-backend.txt
    - trivy image --no-progress --severity HIGH,CRITICAL --input frontend-image.tar --format table --output trivy-frontend.txt
    - trivy image --no-progress --severity HIGH,CRITICAL --input secops-bot-image.tar --format table --output trivy-secops-bot.txt
  artifacts:
    paths:
      - trivy-backend.txt
      - trivy-frontend.txt
      - trivy-secops-bot.txt
    when: always
  allow_failure: true

push_registry:
  stage: push
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker load -i backend-image.tar
    - docker load -i frontend-image.tar
    - docker load -i secops-bot-image.tar
    - docker push "$BACKEND_IMAGE"
    - docker push "$FRONTEND_IMAGE"
    - docker push "$BOT_IMAGE"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true

zap_dast:
  stage: dast
  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]
  script:
    - mkdir -p /zap/wrk
    - zap-baseline.py -t "$ZAP_TARGET_URL" -g gen.conf -I -r dast_report.html
    - cp /zap/wrk/dast_report.html ./dast_report.html
  artifacts:
    paths:
      - dast_report.html
    when: always
  allow_failure: true

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploy with Docker Compose or Kubernetes using the manifests in this repository."
    - echo "Example: docker compose up -d"
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: true
