image: python:3.11-slim

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAME: "devsecops-api"

stages:
  - install
  - lint
  - test
  - sast
  - build
  - container_scan
  - push
  - deploy

install_dependencies:
  stage: install
  script:
    - pip install -r app/requirements.txt
  artifacts:
    paths:
      - .venv/

lint_code:
  stage: lint
  script:
    - pip install flake8
    - flake8 app/ --max-line-length=120 --ignore=W293
  allow_failure: true

test_code:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest app/ --cov=app/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: true

sonar_scan:
  stage: sast
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner -Dsonar.projectKey=devsecops-api -Dsonar.sources=app/
  allow_failure: true

build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA .
    - docker save $IMAGE_NAME:$CI_COMMIT_SHA > image.tar
  artifacts:
    paths:
      - image.tar

trivy_scan:
  stage: container_scan
  image:
    name: docker.io/aquasec/trivy:latest
    entrypoint: [""]
  script:
    # Scan the tarball generated in the build stage for HIGH and CRITICAL vulnerabilities
    - trivy image --no-progress --severity HIGH,CRITICAL --input image.tar
  allow_failure: true

push_registry:
  stage: push
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Skipping remote push until Phase 8."
  allow_failure: true

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deployment stage pending Phase 8 configuration."
  allow_failure: true
