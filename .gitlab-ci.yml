image: python:3.11-slim

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

stages:
  - install
  - lint
  - test
  - sast
  - build
  - push
  - deploy

install_dependencies:
  stage: install
  script:
    - pip install -r app/requirements.txt
  artifacts:
    paths:
      - .venv/

lint_code:
  stage: lint
  script:
    - pip install flake8
    - flake8 app/
  allow_failure: true

test_code:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest app/ --cov=app/ --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: true

sonar_scan:
  stage: sast
  image: sonarsource/sonar-scanner-cli:latest
  script:
    - sonar-scanner
  allow_failure: true

build_image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker save $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA > image.tar
  artifacts:
    paths:
      - image.tar

push_registry:
  stage: push
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - docker load < image.tar
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  allow_failure: true

deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deployment stage pending Phase 8 configuration."
  allow_failure: true
