apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-backend
  namespace: devsecops-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-backend
  template:
    metadata:
      labels:
        app: vault-backend
    spec:
      containers:
        - name: backend
          image: zero-trust-vault/backend:semester
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vault-backend
  namespace: devsecops-project
spec:
  selector:
    app: vault-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
