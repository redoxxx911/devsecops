apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-frontend
  namespace: devsecops-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-frontend
  template:
    metadata:
      labels:
        app: vault-frontend
    spec:
      containers:
        - name: frontend
          image: zero-trust-vault/frontend:semester
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: vault-frontend
  namespace: devsecops-project
spec:
  type: NodePort
  selector:
    app: vault-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
